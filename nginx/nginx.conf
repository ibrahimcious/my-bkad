# Reverse proxy for the BKAD Pasuruan dashboard.
#
# Ships as HTTP-only so the stack runs immediately after `docker compose
# up`. To enable HTTPS once a domain and Let's Encrypt certificate exist,
# follow the "Enable HTTPS" section of docs/deploy.md — it provides the
# 443 server block to add here.

server {
    listen 80;
    server_name _;

    # LRA Excel uploads — allow headroom above nginx's 1M default.
    client_max_body_size 20M;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
